<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENTAL.AI — Themis</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0033, #000000);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
}

header h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.3em;
    background: linear-gradient(90deg, #c77dff, #7b2cbf, #e0aaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* MODE SELECTOR */
#modes {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-bottom: 10px;
}

.mode {
    padding: 8px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    font-size: 0.8em;
}

.active {
    background: linear-gradient(90deg,#c77dff,#7b2cbf);
}

/* CHAT */
#chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.msg {
    max-width: 75%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

.user {
    margin-left: auto;
    background: rgba(255,255,255,0.1);
}

.bot {
    background: rgba(199,125,255,0.15);
}

/* INPUT */
#inputArea {
    display: flex;
    padding: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.send {
    margin-left: 10px;
    padding: 12px 18px;
    border-radius: 20px;
    cursor: pointer;
    background: linear-gradient(90deg,#c77dff,#7b2cbf);
}
</style>
</head>

<body>

<header>
<h1>MENTAL.AI — Themis ⚖️</h1>
</header>

<div id="modes">
<div class="mode active" onclick="setMode('reflect',this)">Reflect</div>
<div class="mode" onclick="setMode('reframe',this)">Reframe</div>
<div class="mode" onclick="setMode('plan',this)">Plan</div>
<div class="mode" onclick="setMode('ground',this)">Ground</div>
<div class="mode" onclick="setMode('journal',this)">Journal</div>
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Speak your thoughts...">
<div class="send" onclick="send()">Send</div>
</div>

<script>
let mode = "reflect";
let memory = [];

const chat = document.getElementById("chat");

function setMode(m, el){
    mode = m;
    document.querySelectorAll(".mode").forEach(e=>e.classList.remove("active"));
    el.classList.add("active");
}

function addMsg(text,type){
    const div = document.createElement("div");
    div.className = "msg "+type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

addMsg("Themis ⚖️ here.\n\nI offer structured reflection, not therapy.\nIf things feel unsafe, please seek real-world support.\n\nChoose a mode above or speak freely.","bot");

function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg(text,"user");
    input.value="";
    memory.push(text);

    setTimeout(()=>respond(text.toLowerCase()),400);
}

/* EMOTION DETECTION */
function detectEmotion(t){
    if(t.includes("stress")||t.includes("overwhelmed")) return "stress";
    if(t.includes("sad")||t.includes("empty")) return "sad";
    if(t.includes("overthinking")) return "overthinking";
    if(t.includes("angry")) return "anger";
    return "neutral";
}

/* RESPONDER */
function respond(text){

    // 🚨 crisis
    if(text.includes("suicide")||text.includes("kill myself")||text.includes("die")){
        addMsg("This matters deeply.\n\nPlease reach out to someone immediately—trusted person or professional.\nIf you're in danger, contact emergency services.\n\nI'm here with you.","bot");
        return;
    }

    let emotion = detectEmotion(text);

    if(mode==="reflect"){
        addMsg("Let’s observe without judgment ⚖️\n\nWhat exactly triggered this feeling?\nWhat part of it is within your control?","bot");
    }

    else if(mode==="reframe"){
        addMsg("Let’s shift perspective ⚖️\n\nIs there another interpretation of this situation that is less harmful?\nWhat would a neutral observer say?","bot");
    }

    else if(mode==="plan"){
        addMsg("We move into action.\n\nStep 1: Define the problem clearly\nStep 2: Identify one small action\nStep 3: Execute today\n\nWhat is your first step?","bot");
    }

    else if(mode==="ground"){
        addMsg("Return to the present.\n\nLook around: name 5 things you see\n4 things you feel\n3 things you hear\n\nYou are here. You are stable.","bot");
    }

    else if(mode==="journal"){
        addMsg("Write freely:\n\nWhat am I feeling?\nWhy?\nWhat do I need right now?\n\nNo filter.","bot");
    }
}
</script>

</body>
</html>
