<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THEIA • Mind Escape</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    overflow:hidden;
    color:white;
    font-family:'Inter',sans-serif;
}

/* BACKGROUND */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#00f0ff22,transparent 30%),
    radial-gradient(circle at bottom right,#8b5cf622,transparent 30%),
    radial-gradient(circle at center,#2563eb22,transparent 40%);
    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:40px 40px;
    animation:gridMove 18s linear infinite;
    z-index:-2;
}

@keyframes gridMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(40px);
    }
}

/* MAIN */

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.panel{
    width:100%;
    max-width:1000px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:35px;
    padding:40px;
    backdrop-filter:blur(20px);
    box-shadow:0 0 60px rgba(0,240,255,0.15);
    text-align:center;
}

.logo{
    font-family:'Orbitron',sans-serif;
    font-size:3rem;
    color:#00f0ff;
    margin-bottom:12px;
    text-shadow:0 0 20px #00f0ff;
}

.subtitle{
    color:#cbd5e1;
    line-height:1.8;
    margin-bottom:40px;
}

/* GAME */

.game-area{
    position:relative;
    width:100%;
    height:450px;
    border-radius:30px;
    overflow:hidden;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
}

.orb{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    cursor:pointer;
    transition:0.15s;
    box-shadow:0 0 25px rgba(255,255,255,0.3);
}

.good{
    background:radial-gradient(circle,#00f0ff,#2563eb);
}

.bad{
    background:radial-gradient(circle,#ff4d6d,#7f1d1d);
}

/* STATS */

.stats{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:30px;
    flex-wrap:wrap;
}

.stat{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    padding:18px 30px;
    border-radius:18px;
}

.stat h3{
    color:#00f0ff;
    margin-bottom:8px;
}

/* TEXT */

.message{
    margin-top:30px;
    font-size:1.1rem;
    color:#dbe4f0;
    line-height:1.8;
    min-height:60px;
}

/* BUTTON */

button{
    margin-top:25px;
    padding:16px 32px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#00f0ff,#8b5cf6);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-5px) scale(1.03);
}

/* MOBILE */

@media(max-width:700px){

    .logo{
        font-size:2.2rem;
    }

    .game-area{
        height:350px;
    }

}

</style>
</head>

<body>

<div class="grid"></div>

<div class="container">

    <div class="panel">

        <div class="logo">THEIA • Mind Escape</div>

        <div class="subtitle">
            Remove negative neural signals and collect calm energy spheres.
            Train your focus, reaction speed, and emotional filtering system.
        </div>

        <div class="game-area" id="gameArea"></div>

        <div class="stats">

            <div class="stat">
                <h3>Calm Energy</h3>
                <p id="score">0</p>
            </div>

            <div class="stat">
                <h3>Mental Noise</h3>
                <p id="noise">100%</p>
            </div>

            <div class="stat">
                <h3>Neural Stability</h3>
                <p id="stability">0%</p>
            </div>

        </div>

        <div class="message" id="message">
            Collect blue neural spheres and avoid red stress signals.
        </div>

        <button onclick="startGame()">
            Start Neural Session
        </button>

    </div>

</div>

<script>

const gameArea = document.getElementById('gameArea');

let score = 0;
let noise = 100;
let stability = 0;

let gameRunning = false;

/* START */

function startGame(){

    if(gameRunning) return;

    gameRunning = true;

    spawnOrb();

}

/* CREATE ORBS */

function spawnOrb(){

    if(!gameRunning) return;

    const orb = document.createElement('div');

    orb.classList.add('orb');

    const goodOrb = Math.random() > 0.3;

    if(goodOrb){

        orb.classList.add('good');

    }else{

        orb.classList.add('bad');

    }

    const areaWidth = gameArea.clientWidth - 80;
    const areaHeight = gameArea.clientHeight - 80;

    const x = Math.random() * areaWidth;
    const y = Math.random() * areaHeight;

    orb.style.left = x + 'px';
    orb.style.top = y + 'px';

    gameArea.appendChild(orb);

    /* CLICK */

    orb.onclick = () => {

        if(goodOrb){

            score += 10;

            noise -= 6;

            stability += 7;

            updateMessage(
            'Positive neural energy absorbed. Mental balance improving.'
            );

        }else{

            score -= 5;

            noise += 8;

            stability -= 6;

            updateMessage(
            'Stress signal detected. Refocus your awareness.'
            );

        }

        if(noise < 0) noise = 0;
        if(noise > 100) noise = 100;

        if(stability < 0) stability = 0;
        if(stability > 100) stability = 100;

        updateStats();

        orb.remove();

    };

    /* AUTO REMOVE */

    setTimeout(() => {

        if(orb.parentNode){

            orb.remove();

        }

    },1500);

    /* LOOP */

    setTimeout(spawnOrb,700);

}

/* UPDATE */

function updateStats(){

    document.getElementById('score').innerText = score;

    document.getElementById('noise').innerText = noise + '%';

    document.getElementById('stability').innerText =
    stability + '%';

}

/* MESSAGE */

function updateMessage(text){

    document.getElementById('message').innerText = text;

}

/* ENDING */

setInterval(() => {

    if(stability >= 100){

        updateMessage(
        'Neural synchronization complete. Emotional clarity achieved.'
        );

        gameRunning = false;

    }

},1000);

</script>

</body>
</html>
